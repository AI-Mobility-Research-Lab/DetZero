<!DOCTYPE html>
<html>
<head>
    <title>Debug DetZero Viewer</title>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <style>
        body { margin: 0; overflow: hidden; }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 15px;
            font-family: monospace;
            font-size: 12px;
            max-width: 400px;
            z-index: 100;
        }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="info">Loading...</div>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const info = document.getElementById('info');
        
        async function init() {
            try {
                // Load data
                info.innerHTML = 'Loading data...';
                const response = await fetch('data/detection_data.json');
                const data = await response.json();
                
                info.innerHTML = `Data loaded: ${data.length} frames<br>`;
                
                if (data.length > 0 && data[0].boxes) {
                    info.innerHTML += `Frame 0 has ${data[0].boxes.length} boxes<br>`;
                    info.innerHTML += `First box: ${JSON.stringify(data[0].boxes[0], null, 2)}<br>`;
                }
                
                // Setup scene
                const scene = new THREE.Scene();
                scene.background = new THREE.Color(0x1a1a2e);
                
                const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.set(50, 50, 50);
                camera.lookAt(0, 0, 0);
                
                const renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                document.body.appendChild(renderer.domElement);
                
                const controls = new OrbitControls(camera, renderer.domElement);
                controls.enableDamping = true;
                
                // Add lights
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
                scene.add(ambientLight);
                
                const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
                directionalLight.position.set(50, 50, 50);
                scene.add(directionalLight);
                
                // Add grid
                const gridHelper = new THREE.GridHelper(150, 30, 0x444444, 0x333333);
                scene.add(gridHelper);
                
                // Add axes
                const axesHelper = new THREE.AxesHelper(20);
                scene.add(axesHelper);
                
                // Add boxes from first frame
                let boxCount = 0;
                if (data[0] && data[0].boxes) {
                    data[0].boxes.forEach(box => {
                        const { center, size, rotation, score } = box;
                        
                        const geometry = new THREE.BoxGeometry(size[0], size[2], size[1]);
                        const material = new THREE.MeshStandardMaterial({
                            color: 0x00ff00,
                            transparent: true,
                            opacity: 0.5
                        });
                        
                        const mesh = new THREE.Mesh(geometry, material);
                        mesh.position.set(center[0], center[2], center[1]);
                        mesh.rotation.y = rotation;
                        
                        // Add edges
                        const edges = new THREE.EdgesGeometry(geometry);
                        const lineMaterial = new THREE.LineBasicMaterial({ color: 0x00ff00, linewidth: 2 });
                        const lineSegments = new THREE.LineSegments(edges, lineMaterial);
                        mesh.add(lineSegments);
                        
                        scene.add(mesh);
                        boxCount++;
                    });
                }
                
                info.innerHTML += `Added ${boxCount} boxes to scene<br>`;
                info.innerHTML += `Camera at: (${camera.position.x}, ${camera.position.y}, ${camera.position.z})<br>`;
                info.innerHTML += `Scene children: ${scene.children.length}<br>`;
                
                // Animation loop
                function animate() {
                    requestAnimationFrame(animate);
                    controls.update();
                    renderer.render(scene, camera);
                }
                animate();
                
                info.innerHTML += '<br><strong>Scene ready!</strong><br>Use mouse to rotate/zoom';
                
            } catch (error) {
                info.innerHTML = `Error: ${error.message}<br>${error.stack}`;
                console.error(error);
            }
        }
        
        init();
    </script>
</body>
</html>
